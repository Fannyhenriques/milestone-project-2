<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A fun beginner friendly online Memory game">
	<meta name="author" content="Fanny Henriques">
	<link rel="stylesheet" href="style.css" />
	<title>Memory Match</title>
</head>

<body>
	<header>
		<nav>
			<a href="/index.html">
				<img src="/assets/icons/logo.png" alt="logo of memory cards" class="logo">
			</a>
			<h1>Memory Match</h1>
			<button id="rules-btn">Game Rules</button>
		</nav>
	</header>

	<main>
		<section id="start-section" class="start-section">
			<h2>Enter your name</h2>

			<form id="start-form">
				<input type="text" id="player-name" placeholder="Your name" required minlength="2">
				<button type="submit">Start Game</button>
			</form>

		</section>

		<h2 id="welcome-message" class="hidden"></h2>
		<section class="game-board hidden">

		</section>

		<section class="game-info hidden" id="game-info">
			<div class="info-box" id="info-box">
				<span>Moves:</span>
				<span id="moves"></span>
			</div>

			<div class="info-box" id="info-box">
				<span>Misses:</span>
				<span id="misses"></span>
			</div>

			<div class="info-box" id="info-box">
				<span>Score:</span>
				<span id="score"></span>
			</div>
		</section>
		<section id="end-screen" class="end-screen hidden">
			<h2 id="end-message"></h2>
			<p id="final-score"></p>
			<p id="final-moves"></p>
			<p id="final-misses"></p>
			<button id="play-again-btn" class="btn">Play Again</button>
			<button id="new-game-btn" class="btn">New Game</button>
		</section>

	</main>

	<script src="script.js" defer></script>
</body>

</html>
